# ============================================================
# TBIBI - Production Profile (Azure Deployment)
# All values come from Azure App Service environment variables
# ============================================================

# Database - values will come from Azure environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Port (Azure App Service expects 8080)
server.port=8080
server.address=0.0.0.0

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# Activation URL (frontend deployed URL)
application.mailing.frontend.activation-url=${FRONTEND_ACTIVATION_URL}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Groq AI
groq.api.key=${GROQ_API_KEY}

# Python AI Services (deployed URL on Azure)
gemma.service.url=${GEMMA_SERVICE_URL}
tbibi.python.segment-url=${PYTHON_SEGMENT_URL}

# Tesseract (path on the Azure server)
tesseract.datapath=${TESSERACT_DATAPATH:/usr/share/tesseract-ocr/4.00/tessdata}

# Terra Smartwatch API
terra.dev-id=${TERRA_DEV_ID}
terra.api-key=${TERRA_API_KEY}
terra.base-url=${TERRA_BASE_URL:https://api.tryterra.co/v2}

# Twilio SMS
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.phone-number=${TWILIO_PHONE_NUMBER}

# Actuator / Monitoring
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.enabled=true
management.endpoints.web.base-path=/actuator
