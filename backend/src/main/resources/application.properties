spring.application.name=Tbibi
### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:3306/tbibii\
?createDatabaseIfNotExist=true\
&useUnicode=true\
&useJDBCCompliantTimezoneShift=true\
&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
server.port=8088

app.jwt.secret=MySuperSecretKeyForJwtAuthSpringSecurity2026!
app.jwt.expiration-ms=3600000

### MAIL ###
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=contacttbibi@gmail.com
spring.mail.password=password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.default-encoding=UTF-8

### ACTIVATION URL ###
application.mailing.frontend.activation-url=http://localhost:4200/activate-account