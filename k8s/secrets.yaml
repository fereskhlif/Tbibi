#   PowerShell: [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes("your_value"))
#
# Then replace the placeholder values below with your encoded values.
# Apply with: kubectl apply -f secrets.yaml -n tbibi
# ============================================================

