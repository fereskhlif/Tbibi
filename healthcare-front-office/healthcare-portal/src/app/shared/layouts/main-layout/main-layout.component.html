<div class="flex h-screen bg-gray-50 font-sans text-gray-900 relative">
  <!-- Fixed Sidebar -->
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col z-30 shrink-0 transition-all duration-300">
    <div class="h-16 flex items-center px-6 border-b border-gray-200">
      <app-logo variant="full"></app-logo>
    </div>

    <nav class="flex-1 p-4 space-y-1 overflow-y-auto custom-scrollbar">
      <app-nav-button
        *ngFor="let item of navItems"
        [active]="currentPage === item.path"
        [icon]="item.icon"
        (onClick)="navigateTo(item.path)"
      >
        {{item.label}}
      </app-nav-button>
    </nav>

    <div class="p-4 border-t border-gray-200 bg-gray-50/50">
      <button
        (click)="logout()"
        class="w-full px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors flex items-center gap-2 justify-center border border-transparent hover:border-red-100"
      >
        <lucide-icon name="log-out" class="w-4 h-4"></lucide-icon> Logout
      </button>
    </div>
  </aside>

  <!-- Main Column -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <!-- Top Header -->
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 z-20">
      <div class="flex items-center gap-4">
        <h2 class="text-xl font-bold text-gray-800 capitalize">{{headerTitle}}</h2>
      </div>

      <div class="flex items-center gap-4">
          <!-- Global Cart Icon (Patient only) -->
          <div *ngIf="role === 'patient'" class="relative flex items-center h-full mr-2">
            <button (click)="router.navigate(['/patient/cart'])"
                class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors relative h-[40px] w-[40px] flex items-center justify-center">
                <lucide-icon name="shopping-cart" [size]="20"></lucide-icon>

                <!-- Bouncing Badge when items exist -->
                <span *ngIf="(cartService.cartItems$ | async)?.length! > 0"
                      class="absolute top-1 right-1 w-4 h-4 bg-blue-600 text-white text-[10px] font-bold flex items-center justify-center rounded-full shadow-md border-2 border-white ring-2 ring-blue-500/30 transition-all select-none pointer-events-none">
                    {{cartService.getItemCount()}}
                </span>
            </button>
        </div>

          <div *ngIf="role === 'patient'" class="h-8 w-px bg-gray-200 mx-1"></div>

          <!-- Notification Bell -->
          <div class="relative cursor-pointer hover:bg-gray-100 rounded-full transition-colors flex items-center justify-center"
               style="width: 42px; height: 42px;"
               [class.animate-pulse-glow]="(notificationService.unreadCount$ | async)! > 0"
               (click)="showNotifications = !showNotifications; $event.stopPropagation()">

            <lucide-icon name="bell" class="w-6 h-6 text-gray-700"
              [class.animate-bell-bounce]="justReceivedNotification"></lucide-icon>

            <!-- Unread Badge -->
            <span *ngIf="(notificationService.unreadCount$ | async)! > 0"
              class="bg-red-500 text-white font-bold flex items-center justify-center rounded-full shadow-sm"
              [class.animate-count-pop]="justReceivedNotification"
              style="position: absolute; top: -2px; right: -2px; min-width: 20px; height: 20px; font-size: 11px; padding: 0 5px; line-height: 1; border: 2px solid white;">
              {{ (notificationService.unreadCount$ | async)! > 99 ? '99+' : (notificationService.unreadCount$ | async) }}
            </span>

            <!-- Notification Dropdown -->
            <div *ngIf="showNotifications" class="absolute bg-white rounded-xl shadow-xl border border-gray-100 z-50 animate-fade-in overflow-hidden"
                 style="width: 360px; max-width: 90vw; right: 0; top: 100%; margin-top: 8px;" (click)="$event.stopPropagation()">

              <!-- Header -->
              <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100 bg-gray-50 flex-shrink-0">
                <h3 class="font-bold text-[15px] text-gray-900">Notifications</h3>
                <button
                  (click)="router.navigate(['/notifications']); showNotifications = false"
                  class="text-xs text-blue-600 hover:text-blue-800 font-semibold cursor-pointer transition-colors whitespace-nowrap">
                  See All
                </button>
              </div>

              <!-- Scrollable List -->
              <div class="overflow-y-auto" style="max-height: 320px; min-height: 100px;">
                <div class="p-2">
                  <ng-container *ngIf="(notificationService.notifications$ | async) as notifications">

                    <!-- Empty State -->
                    <div *ngIf="notifications.length === 0" class="py-12 text-center">
                      <lucide-icon name="bell" [size]="32" class="text-gray-200 mx-auto mb-3"></lucide-icon>
                      <p class="text-sm text-gray-400 font-medium whitespace-nowrap">No notifications yet</p>
                    </div>

                    <!-- Notification Items -->
                    <div *ngFor="let n of notifications"
                      (click)="onNotificationClick(n)"
                      class="flex items-start gap-3 p-3 mb-1 cursor-pointer rounded-lg transition-colors"
                      [ngClass]="n.isRead ? 'hover:bg-gray-100 bg-white' : 'bg-blue-50/60 hover:bg-blue-100'">

                      <!-- Icon -->
                      <div class="shrink-0 w-10 h-10 rounded-full flex items-center justify-center"
                        [ngClass]="n.type === 'FORUM' ? 'bg-purple-100 text-purple-600' : n.type === 'ORDER' ? 'bg-orange-100 text-orange-600' : 'bg-blue-100 text-blue-600'">
                        <lucide-icon [name]="n.type === 'FORUM' ? 'message-circle' : n.type === 'ORDER' ? 'package' : 'bell'" [size]="20" strokeWidth="1.5"></lucide-icon>
                      </div>

                      <!-- Content -->
                      <div class="flex-1 min-w-0 mr-2">
                        <p class="text-[13px] leading-snug break-words" [ngClass]="n.isRead ? 'text-gray-700' : 'text-gray-900 font-semibold'">
                          {{ n.message }}
                        </p>
                        <p class="text-[11px] mt-1" [ngClass]="n.isRead ? 'text-gray-500' : 'text-blue-600 font-medium'">
                          {{ timeAgoNotification(n.createdAt) }}
                        </p>
                      </div>

                      <!-- Unread Dot -->
                      <div *ngIf="!n.isRead" class="shrink-0 w-2.5 h-2.5 bg-blue-600 rounded-full mt-1"></div>
                    </div>

                  </ng-container>
                </div>
              </div>
            </div>
          </div>

          <!-- User Profile Dropdown -->
          <div class="relative cursor-pointer ml-2" (click)="showProfileDropdown = !showProfileDropdown">
            <div class="flex items-center gap-2 cursor-pointer hover:bg-gray-100 rounded-lg px-2 py-1 transition-colors">
              <div class="w-9 h-9 rounded-full bg-blue-600 flex items-center justify-center shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                </svg>
              </div>
              <span class="text-sm font-medium text-gray-700">{{ currentUserName }}</span>
              <svg class="w-4 h-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </div>

            <!-- Dropdown Menu -->
            <div *ngIf="showProfileDropdown" class="absolute right-0 top-full mt-2 w-56 bg-white rounded-xl shadow-xl border border-gray-100 py-2 z-50 animate-fade-in" (click)="$event.stopPropagation()">
              <div class="px-4 py-3 border-b border-gray-100 mb-1">
                <p class="text-sm font-medium text-gray-900">{{ currentUserName }}</p>
                <p class="text-xs text-gray-500 truncate capitalize">{{role}} Account</p>
              </div>

              <button (click)="navigateTo('profile'); showProfileDropdown = false" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2 transition-colors">
                <lucide-icon name="user" [size]="16" class="text-gray-400"></lucide-icon> View Profile
              </button>

              <button (click)="router.navigate(['/patient/forum/my-posts']); showProfileDropdown = false" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2 transition-colors">
                <lucide-icon name="message-square" [size]="16" class="text-gray-400"></lucide-icon> My Posts
              </button>

              <div class="h-px bg-gray-100 my-1"></div>

              <button (click)="logout()" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2">
                <lucide-icon name="log-out" [size]="16" class="text-red-500"></lucide-icon> Logout
              </button>
            </div>
          </div>
      </div>
    </header>

    <!-- Main Content (Scrollable) -->
    <main class="flex-1 overflow-auto bg-gray-50 p-6 relative" id="main-content" (click)="showNotifications = false; showProfileDropdown = false">
      <div class="max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

  <!-- Toast Container (Global) -->
  <div id="toast-container" class="fixed top-20 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

  <!-- Floating AI Chat Button (Patient only) -->
  <div class="absolute right-8 bottom-8 z-[100]" style="position: absolute; bottom: 2rem; right: 2rem; z-index: 100;" *ngIf="role === 'patient'">
    <button
      (click)="navigateTo('chat')"
      class="w-14 h-14 bg-gradient-to-br from-purple-600 to-indigo-700 hover:from-purple-500 hover:to-indigo-600 text-white rounded-full shadow-lg hover:shadow-2xl transition-all flex items-center justify-center group active:scale-95"
      title="AI Health Assistant"
    >
      <lucide-icon name="message-square" class="w-7 h-7"></lucide-icon>
      <span class="absolute right-16 bg-gray-900 text-white text-xs px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">
        AI Assistant
      </span>
    </button>
  </div>
</div>
