<div class="max-w-3xl mx-auto py-8">
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden min-h-[500px]">
    
    <!-- Page Header -->
    <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between sticky top-0 bg-white z-10 shadow-sm">
      <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Notifications</h1>
      <button *ngIf="(notificationService.unreadCount$ | async)! > 0"
        (click)="markAllAsRead()"
        class="text-sm font-semibold text-blue-600 hover:text-blue-800 bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-lg transition-colors">
        Mark all as read
      </button>
    </div>

    <!-- Lists -->
    <div class="pb-6">
      <!-- Empty State -->
      <div *ngIf="(notificationService.notifications$ | async)?.length === 0" class="flex flex-col items-center justify-center py-24 text-gray-400">
        <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-4">
          <lucide-icon name="bell" [size]="40" class="text-gray-300"></lucide-icon>
        </div>
        <p class="text-lg font-medium text-gray-600">You have no notifications.</p>
        <p class="text-sm text-gray-400 mt-1">When you get notifications, they'll show up here.</p>
      </div>

      <!-- New / Unread -->
      <ng-container *ngIf="(unreadNotifications$ | async) as unread">
        <div *ngIf="unread.length > 0">
          <div class="px-6 pt-5 pb-2">
            <h2 class="text-[17px] font-bold text-gray-900">New</h2>
          </div>
          <div class="flex flex-col">
            <ng-container *ngTemplateOutlet="notificationList; context: { $implicit: unread }"></ng-container>
          </div>
        </div>
      </ng-container>

      <!-- Earlier / Read -->
      <ng-container *ngIf="(readNotifications$ | async) as read">
        <div *ngIf="read.length > 0" [class.mt-4]="(unreadNotifications$ | async)?.length! > 0">
          <div class="px-6 pt-5 pb-2">
            <h2 class="text-[17px] font-bold text-gray-900">Earlier</h2>
          </div>
          <div class="flex flex-col">
            <ng-container *ngTemplateOutlet="notificationList; context: { $implicit: read }"></ng-container>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</div>

<!-- Reusable Template for Notification Item -->
<ng-template #notificationList let-list>
  <div *ngFor="let n of list" 
       (click)="onNotificationClick(n)"
       class="flex items-start gap-4 px-6 py-3 cursor-pointer transition-colors relative"
       [ngClass]="n.isRead ? 'hover:bg-gray-50 bg-white' : 'bg-blue-50/30 hover:bg-blue-50/60'">
    
    <!-- Context Icon -->
    <div class="shrink-0 relative mt-1">
      <div class="w-14 h-14 rounded-full flex items-center justify-center shadow-inner"
        [ngClass]="n.type === 'FORUM' ? 'bg-purple-100 text-purple-600' : n.type === 'ORDER' ? 'bg-orange-100 text-orange-600' : 'bg-blue-100 text-blue-600'">
        <lucide-icon [name]="n.type === 'FORUM' ? 'message-circle' : n.type === 'ORDER' ? 'package' : 'bell'" [size]="28" strokeWidth="1.5"></lucide-icon>
      </div>
      
      <!-- Sub-badge like Facebook -->
      <div class="absolute -bottom-1 -right-1 w-7 h-7 rounded-full flex items-center justify-center border-2 border-white"
        [ngClass]="n.type === 'FORUM' ? 'bg-green-500' : 'bg-blue-500'">
        <lucide-icon [name]="n.type === 'FORUM' ? 'message-circle' : 'info'" [size]="14" class="text-white" strokeWidth="3"></lucide-icon>
      </div>
    </div>

    <!-- Content -->
    <div class="flex-1 min-w-0 pt-1 flex items-center justify-between">
      <div class="flex-1 pr-6">
        <p class="text-[15px] leading-snug break-words" [ngClass]="n.isRead ? 'text-gray-700' : 'text-gray-900 font-semibold'">
           {{ n.message }}
        </p>
        <p class="text-[13px] mt-1" [ngClass]="n.isRead ? 'text-gray-500' : 'text-blue-600 font-semibold'">
          {{ timeAgoNotification(n.createdAt) }}
        </p>
      </div>
      
      <!-- Unread Indicator Dot at the far right -->
      <div *ngIf="!n.isRead" class="shrink-0 flex items-center h-full">
         <div class="w-3 h-3 bg-blue-600 rounded-full mt-2"></div>
      </div>
      
      <!-- Horizontal Menu dots (...) for Facebook similarity -->
      <div *ngIf="n.isRead" class="shrink-0 flex items-center h-full opacity-0 hover:opacity-100 transition-opacity">
         <button class="p-2 hover:bg-gray-200 rounded-full text-gray-500">
           <lucide-icon name="more-horizontal" [size]="20"></lucide-icon>
         </button>
      </div>
    </div>
  </div>
</ng-template>
