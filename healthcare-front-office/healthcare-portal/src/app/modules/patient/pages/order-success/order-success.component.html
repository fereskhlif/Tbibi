<div class="min-h-[80vh] flex items-center justify-center p-6 lg:p-10 font-sans bg-[#F8FAFC]">

    <div
        class="bg-white rounded-[32px] shadow-2xl w-full max-w-lg overflow-hidden relative border border-gray-100 animate-fade-in">

        <!-- Header / Banner -->
        <div class="bg-gradient-to-br from-emerald-500 to-emerald-600 p-10 flex flex-col items-center text-center">

            <div
                class="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-lg shadow-emerald-900/20 mb-8 animate-scale">
                <lucide-icon name="check" [size]="48" class="text-emerald-500"></lucide-icon>
            </div>

            <h2 class="text-3xl font-extrabold text-white mb-3 shadow-sm tracking-tight leading-tight">Order
                Placed<br>Successfully!</h2>
            <p class="text-emerald-50 font-medium text-lg">Thank you for your purchase.</p>
        </div>

        <!-- Body / Actions -->
        <div class="p-10 text-center flex flex-col items-center bg-white">

            <div class="bg-gray-50 w-full rounded-2xl p-6 border border-gray-100 mb-10 shadow-inner">
                <p class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-2">Order Reference</p>
                <p class="text-3xl font-black text-gray-900 tracking-tight">#ORD-{{orderId}}</p>
                <p class="text-xs text-gray-400 font-medium mt-3">A confirmation email has been sent to you.</p>
            </div>

            <div class="flex flex-col w-full gap-4">
                <button (click)="trackOrder()"
                    class="w-full py-4 bg-gray-900 hover:bg-black text-white font-bold text-lg rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] transition-all active:scale-[0.98] flex justify-center items-center gap-2">
                    <lucide-icon name="package" [size]="20"></lucide-icon> Track My Order
                </button>
                <button (click)="continueShopping()"
                    class="w-full py-4 bg-white border-2 border-gray-200 text-gray-700 font-bold text-lg hover:border-blue-600 hover:text-blue-600 rounded-xl transition-all active:scale-[0.98]">
                    Continue Shopping
                </button>
            </div>
        </div>
    </div>

</div>

<style>
    .animate-fade-in {
        animation: fadeIn 0.4s ease-out forwards;
    }

    @keyframes fadeIn {
        0% {
            opacity: 0;
            transform: translateY(10px);
        }

        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
