<div style="min-height: 100vh; background-color: #F8FAFC; display: flex; align-items: center; justify-content: center; padding: 2rem; font-family: ui-sans-serif, system-ui, sans-serif;">
    
    <div style="background: white; border: 1px solid #e2e8f0; border-radius: 3rem; overflow: hidden; width: 100%; max-width: 600px; box-shadow: 0 50px 100px -20px rgba(15, 23, 42, 0.1); position: relative;">
        
        <!-- Premium Blue/Emerald Header -->
        <div style="background: linear-gradient(135deg, #1d4ed8, #2563eb, #10b981); padding: 5rem 2rem; display: flex; flex-direction: column; align-items: center; text-align: center; color: white;">
            <!-- Floating Background Elements -->
            <div style="position: absolute; top: -5%; left: -5%; width: 200px; height: 200px; background: rgba(255,255,255,0.08); border-radius: 50%; filter: blur(40px);"></div>
            <div style="position: absolute; bottom: 60%; right: -5%; width: 250px; height: 250px; background: rgba(255,255,255,0.1); border-radius: 50%; filter: blur(50px);"></div>
            
            <div style="width: 100px; height: 100px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.2); margin-bottom: 2rem; position: relative;">
                <lucide-icon name="check" [size]="48" style="color: #10b981;"></lucide-icon>
            </div>
            
            <h1 style="font-size: 2.5rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 0.75rem; line-height: 1.1;">Order Confirmed!</h1>
            <p style="font-size: 1.125rem; font-weight: 600; color: rgba(255,255,255,0.9);">Your medical request has been securely processed.</p>
        </div>

        <div style="padding: 4rem; display: flex; flex-direction: column; align-items: center;">
            
            <!-- Reference Card -->
            <div style="width: 100%; background: #f8fafc; border: 1px solid #f1f5f9; border-radius: 2rem; padding: 2.5rem; text-align: center; margin-bottom: 3rem; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);">
                <span style="font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.2em; display: block; margin-bottom: 0.5rem;">Transaction Hash</span>
                <p style="font-size: 2rem; font-weight: 900; color: #0f172a; letter-spacing: -0.02em; margin-bottom: 0.5rem;">#ORD-{{orderId}}</p>
                <div style="height: 1px; background: #e2e8f0; width: 40px; margin: 1.5rem auto;"></div>
                <p style="font-size: 13px; color: #64748b; font-weight: 600; line-height: 1.6;">
                    A clinical summary and receipt have been dispatched to your registered digital identity.
                </p>
            </div>

            <!-- Action Buttons -->
            <div style="width: 100%; display: flex; flex-direction: column; gap: 1rem;">
                <button (click)="trackOrder()"
                    style="width: 100%; height: 4.5rem; background: #0f172a; color: white; border: none; border-radius: 1.25rem; font-size: 1.125rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: all 0.2s; box-shadow: 0 15px 30px -10px rgba(15, 23, 42, 0.3);"
                    onmouseover="this.style.background='#1e293b'; this.style.transform='translateY(-2px)';"
                    onmouseout="this.style.background='#0f172a'; this.style.transform='translateY(0)';">
                    <lucide-icon name="package" [size]="20"></lucide-icon>
                    Monitor Status
                </button>
                
                <button (click)="continueShopping()"
                    style="width: 100%; height: 4.5rem; background: transparent; border: 2px solid #e2e8f0; border-radius: 1.25rem; font-size: 1.125rem; font-weight: 800; color: #64748b; cursor: pointer; transition: all 0.2s;"
                    onmouseover="this.style.borderColor='#cbd5e1'; this.style.color='#1e293b'; this.style.background='#f8fafc';"
                    onmouseout="this.style.borderColor='#e2e8f0'; this.style.color='#64748b'; this.style.background='transparent';">
                    Return to Pharmacy
                </button>
            </div>

            <!-- Trust Footer -->
            <div style="margin-top: 3rem; display: flex; align-items: center; gap: 12px; opacity: 0.6;">
                <lucide-icon name="shield-check" [size]="16" style="color: #10b981;"></lucide-icon>
                <span style="font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em;">Secure Clinical Pipeline Verified</span>
            </div>
            
        </div>

    </div>

</div>
